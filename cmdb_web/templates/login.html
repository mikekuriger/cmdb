<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — CMDB</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body { background:#16191f; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card { border-radius:10px; box-shadow:0 10px 40px rgba(0,0,0,.4); border:0; }
    .brand i { font-size:2.8rem; color:#0d6efd; }
  </style>
</head>
<body>
<div class="card" style="width:100%;max-width:380px;">
  <div class="card-body p-4 p-sm-5">
    <div class="brand text-center mb-4">
      <i class="bi bi-hdd-network-fill"></i>
      <h5 class="mt-2 mb-0 fw-bold">CMDB</h5>
      <p class="text-muted small">Infrastructure Asset Manager</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=True) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
    {% endfor %}
    {% endwith %}

    <form method="post" autocomplete="on">
      <div class="mb-3">
        <label class="form-label fw-semibold small">Username</label>
        <input type="text" name="username" class="form-control"
               autocomplete="username" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small">Password</label>
        <input type="password" name="password" class="form-control"
               autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
      </button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
